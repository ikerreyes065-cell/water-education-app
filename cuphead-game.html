<!DOCTYPE html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/cuphead@main/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Cuphead</title>
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: #231F20; font-family: 'Courier New', Courier, monospace; 
        }
        #unityContainer { 
            position: fixed; inset: 0; width: 100%; height: 100%; 
            display: block; background: #231F20; 
        }
        #loading-text { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; text-align: center; z-index: 10;
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px;
            border: 2px solid #f43f5e;
        }
    </style>
</head>

<body>
    <div id="loading-text">INICIALIZANDO MOTOR...</div>
    <div id="unityContainer"></div>

    <script src="Build/UnityLoader.js"></script>

    <script>
        (async () => {
            const loadingText = document.querySelector("#loading-text");

            // Function to fetch and merge the parts properly
            async function fetchAndMerge(fileName, start, end, label) {
                let chunks = [];
                let totalLoaded = 0;
                
                for (let i = start; i <= end; i++) {
                    const url = `Build/${fileName}.part${i}`;
                    try {
                        const response = await fetch(url, { mode: 'cors' });
                        if (!response.ok) throw new Error();
                        
                        const buffer = await response.arrayBuffer();
                        chunks.push(buffer);
                        totalLoaded += buffer.byteLength;
                        
                        // Update Progress UI
                        let mb = (totalLoaded / (1024 * 1024)).toFixed(1);
                        loadingText.textContent = `DESCARGANDO ${label}: ${mb} MB`;
                    } catch (e) {
                        loadingText.textContent = "ERROR DE CONEXIÓN - REINTENTA";
                        throw e;
                    }
                }

                const blob = new Blob(chunks, { type: 'application/octet-stream' });
                chunks = []; // Clear RAM
                return URL.createObjectURL(blob);
            }

            try {
                // 1. Download and merge all 107 total parts
                const asmUrl = await fetchAndMerge("Build.asm.code.unityweb", 1, 3, "SISTEMA");
                const wasmUrl = await fetchAndMerge("Build.wasm.code.unityweb", 1, 2, "MOTOR");
                const dataUrl = await fetchAndMerge("Build.data.unityweb", 1, 102, "NIVELES (2GB)");

                // 2. Setup the Unity Config
                const json = {
                    "companyName": "SpanishFreddy",
                    "productName": "Cuphead",
                    "dataUrl": dataUrl,
                    "wasmCodeUrl": wasmUrl,
                    "wasmFrameworkUrl": "Build/Build.wasm.framework.unityweb",
                    "asmCodeUrl": asmUrl,
                    "asmMemoryUrl": "Build/Build.asm.memory.unityweb",
                    "asmFrameworkUrl": "Build/Build.asm.framework.unityweb",
                    "TOTAL_MEMORY": 536870912, 
                    "graphicsAPI": ["WebGL 2.0"],
                    "webglContextAttributes": { "preserveDrawingBuffer": false },
                    "backgroundColor": "#231F20"
                };

                // 3. Start the game
                const gameInstance = UnityLoader.instantiate("unityContainer", json, {
                    onModuleCreated: () => {
                        loadingText.textContent = "COMPILANDO JUEGO... (No cierres)";
                    }
                });

                // 4. Memory cleanup after game starts
                // We wait 10 seconds to make sure Unity finished reading the Blobs
                setTimeout(() => {
                    loadingText.remove();
                    URL.revokeObjectURL(dataUrl);
                    URL.revokeObjectURL(wasmUrl);
                    URL.revokeObjectURL(asmUrl);
                }, 15000);

            } catch (err) {
                loadingText.innerHTML = "MEMORIA INSUFICIENTE<br>Presiona CTRL+SHIFT+R";
            }
        })();
    </script>
</body>
</html>
