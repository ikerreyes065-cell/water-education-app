<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Cuphead</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #231F20;
            color: white;
            font-family: system-ui, sans-serif;
        }
        #unityContainer {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }
        #loading div {
            margin: 15px 0;
        }
        #title {
            font-size: 42px;
            font-weight: bold;
        }
        #progressContainer {
            width: 420px;
            height: 18px;
            background: #222;
            border: 2px solid #555;
            border-radius: 9999px;
            overflow: hidden;
            margin: 0 auto;
        }
        #progressBar {
            height: 100%;
            background: linear-gradient(90deg, #ffdd00, #ff7700);
            width: 0%;
            transition: width 0.4s ease;
        }
        #status {
            font-size: 20px;
        }
        #bytes {
            font-size: 16px;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div id="title">LOADING CUPHEAD...</div>
        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>
        <div id="status">Downloading & merging files...</div>
        <div id="bytes">0 MB / 2127 MB</div>
    </div>

    <div id="unityContainer"></div>

    <script src="Build/UnityLoader.js"></script>
    <script>
        const loading = document.getElementById('loading');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('status');
        const bytesText = document.getElementById('bytes');

        let loadedBytes = 0;
        const totalMB = 2127;

        function updateProgress(mb) {
            const percent = Math.min(Math.floor((mb / totalMB) * 100), 100);
            progressBar.style.width = percent + '%';
            bytesText.textContent = `${mb.toFixed(1)} MB / ${totalMB} MB`;
        }

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            const chunks = [];

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                loadedBytes += value.length;
                updateProgress(loadedBytes / (1024 * 1024));
            }
            return new Blob(chunks);
        }

        async function mergeParts(baseName, start, end) {
            const parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(`${baseName}.part${i}`);
            }
            const blobs = await Promise.all(parts.map(fetchWithProgress));
            return URL.createObjectURL(new Blob(blobs));
        }

        async function loadGame() {
            try {
                statusText.textContent = "Merging large game files... (this can take time)";

                const [asmUrl, dataUrl, wasmUrl] = await Promise.all([
                    mergeParts("Build/Build.asm.code.unityweb", 1, 3),
                    mergeParts("Build/Build.data.unityweb", 1, 102),
                    mergeParts("Build/Build.wasm.code.unityweb", 1, 2)
                ]);

                const json = {
                    companyName: "SpanishFreddy",
                    productName: "Cuphead",
                    dataUrl: dataUrl,
                    wasmCodeUrl: wasmUrl,
                    wasmFrameworkUrl: "Build.wasm.framework.unityweb",
                    asmCodeUrl: asmUrl,
                    asmMemoryUrl: "Build.asm.memory.unityweb",
                    asmFrameworkUrl: "Build.asm.framework.unityweb",
                    TOTAL_MEMORY: 384 * 1024 * 1024,     // Balanced for 8GB systems
                    graphicsAPI: ["WebGL 2.0"],
                    webglContextAttributes: { preserveDrawingBuffer: false },
                    splashScreenStyle: "Dark",
                    backgroundColor: "#231F20"
                };

                statusText.textContent = "Launching Cuphead...";

                UnityLoader.instantiate("unityContainer", json, {
                    Module: {
                        onRuntimeInitialized: () => {
                            loading.style.display = 'none';
                        }
                    }
                });

            } catch (err) {
                console.error(err);
                statusText.textContent = "Something went wrong during loading.";
                bytesText.textContent = "Check console (F12) for details";
            }
        }

        window.addEventListener('load', loadGame);
    </script>
</body>
</html>
