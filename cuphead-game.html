<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Cuphead - Unblocked</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #231F20;
            color: white;
            font-family: system-ui, sans-serif;
        }
        #header {
            background: #1a1617;
            padding: 12px 20px;
            text-align: center;
            border-bottom: 2px solid #ffcc00;
        }
        #header h1 {
            margin: 0;
            font-size: 28px;
        }
        #game-container {
            width: 100%;
            height: calc(100vh - 56px);
            border: none;
        }
        .info {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>🎮 CUPHEAD - UNBLOCKED</h1>
    </div>
    
    <div class="info">
        Press F11 for fullscreen • Close other tabs for better performance
    </div>

    <!-- Embedded working Cuphead web port -->
    <iframe 
        id="game-container" 
        src="https://aukak.itch.io/cuphead" 
        allowfullscreen>
    </iframe>

    <script>
        // Optional: Try to make the game load smoother
        window.addEventListener('load', () => {
            console.log("Cuphead unblocked page loaded");
        });
    </script>
</body>
</html>
