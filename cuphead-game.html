<!DOCTYPE html>
<html lang="en-us">
<head>
  <base href="https://cdn.jsdelivr.net/gh/web-ports/cuphead@main/">
  <meta charset="utf-8">
  <title>Unity WebGL Player | Cuphead</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #231F20;
    }

    #unityContainer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #loading-text {
      color: white;
      font-size: 40px;
      font-family: cursive;
      text-align: center;
      margin-top: 20px;
    }

    #sidebarad1, #sidebarad2 {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 160px;
      height: 600px;
      z-index: 999999;
    }

    #sidebarad1 { left: 0; }
    #sidebarad2 { right: 0; }

    .sidebar-close {
      position: absolute;
      top: 0;
      right: 0;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      text-align: center;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="loading-text">LOADING...</div>
<div id="unityContainer"></div>

<script src="Build/UnityLoader.js"></script>

<script>
  function resizeUnity() {
    const container = document.getElementById("unityContainer");
    container.style.width = window.innerWidth + "px";
    container.style.height = window.innerHeight + "px";
  }

  window.addEventListener("resize", resizeUnity);

  var gameInstance = UnityLoader.instantiate("unityContainer", {
    dataUrl: "Build/Build.data.unityweb",
    wasmCodeUrl: "Build/Build.wasm.code.unityweb",
    wasmFrameworkUrl: "Build/Build.wasm.framework.unityweb",
    asmCodeUrl: "Build/Build.asm.code.unityweb",
    asmMemoryUrl: "Build/Build.asm.memory.unityweb",
    asmFrameworkUrl: "Build/Build.asm.framework.unityweb",

    companyName: "SpanishFreddy",
    productName: "Cuphead",

    TOTAL_MEMORY: 536870912, // 512MB

    backgroundColor: "#231F20"
  }, {
    Module: {
      onRuntimeInitialized: function () {
        document.getElementById("loading-text").remove();
        resizeUnity();
      }
    }
  });
</script>

<!-- ADS (kept but safe) -->
<div id="sidebarad1">
  <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
</div>

<div id="sidebarad2">
  <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
</div>

</body>
</html>
