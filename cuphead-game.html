<!DOCTYPE html>
<html lang="en-us">
<head>
  <base href="https://cdn.jsdelivr.net/gh/web-ports/cuphead@main/">
  <meta charset="utf-8">
  <title>Unity WebGL Player | Cuphead</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #231F20;
    }

    #unityContainer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #loading-text {
      color: white;
      font-size: 40px;
      font-family: cursive;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div id="loading-text">LOADING...</div>
<div id="unityContainer"></div>

<script>
/* 🔥 REAL ERROR LOGGING */
window.onerror = function(msg, url, line, col, error) {
  console.log("ERROR:", msg, url, line, col, error);
};

/* 🔥 STREAM PART FILES (NO MEMORY EXPLOSION) */
async function streamParts(baseName, count) {
  let current = 1;

  const stream = new ReadableStream({
    async pull(controller) {
      if (current > count) {
        controller.close();
        return;
      }

      const url = `${baseName}.part${current}`;
      console.log("Loading:", url);

      const res = await fetch(url);
      if (!res.ok) {
        throw new Error("Missing part: " + url);
      }

      const reader = res.body.getReader();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        controller.enqueue(value);
      }

      current++;
    }
  });

  return new Response(stream);
}

/* 🔥 PATCH FETCH (Unity will think file exists normally) */
const originalFetch = window.fetch;
window.fetch = async function(resource, options) {

  if (typeof resource === "string" && resource.includes("Build.data.unityweb")) {
    console.log("Intercepting data file...");
    return streamParts("Build/Build.data.unityweb", 102); // 👈 CHANGE PART COUNT IF NEEDED
  }

  return originalFetch(resource, options);
};
</script>

<script src="Build/UnityLoader.js"></script>

<script>
  function resizeUnity() {
    const container = document.getElementById("unityContainer");
    container.style.width = window.innerWidth + "px";
    container.style.height = window.innerHeight + "px";
  }

  window.addEventListener("resize", resizeUnity);

  var gameInstance = UnityLoader.instantiate("unityContainer", {
    dataUrl: "Build/Build.data.unityweb",

    /* ✅ ONLY WASM (FIXED) */
    wasmCodeUrl: "Build/Build.wasm.code.unityweb",
    wasmFrameworkUrl: "Build/Build.wasm.framework.unityweb",

    companyName: "SpanishFreddy",
    productName: "Cuphead",

    TOTAL_MEMORY: 536870912,

    backgroundColor: "#231F20"
  }, {
    Module: {
      onRuntimeInitialized: function () {
        document.getElementById("loading-text").remove();
        resizeUnity();
      }
    }
  });
</script>

</body>
</html>
