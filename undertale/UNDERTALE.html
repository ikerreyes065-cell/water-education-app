<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>UNDERTALE</title>
    
    <link rel="icon" type="image/x-icon" href="https://undertale.win/play/fav.ico">
    <link rel="stylesheet" href="./UNDERTALE_files/ut.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script defer src="./UNDERTALE_files/v8c78df7c7c0f484497ecbca7046644da1771523124516"></script>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VW8CMPRWYS"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-VW8CMPRWYS');
    </script>
</head>

<body oncontextmenu="return false;">

    <div id="game-container">
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        
        <div class="loading">
            <div class="spinner" id="spinner"></div>
            <noscript class="nsmessage">This requires JavaScript and WebAssembly to be enabled in your browser.</noscript>
            <div class="emscripten" id="status">Loading...</div>
            <progress value="0" max="100" id="progress" hidden="1"></progress>
        </div>

        <div id="mobile-controls">
            <div id="joystick-zone"></div>
            <div id="button-zone">
                <img class="action-button" id="button-c" alt="C Button">
                <img class="action-button" id="button-x" alt="X Button">
                <img class="action-button" id="button-z" alt="Z Button">
                <div id="dpad-container"></div>
            </div>
        </div>

        <div class="output-container" id="output-container">
            <div id="mobile-buttons" style="display:none;">
                <button class="output-button" onclick="window.enterPositionMode()">Position Controls?</button>
                <button class="output-button" onclick="toggleDpadMode()">Toggle D-Pad / Joystick!</button>
            </div>
            <button class="output-button" id="fullscreen" onclick="toggleFullscreen()">Toggle Fullscreen?</button>
            <button class="output-button" onclick="toggleConsole()">Toggle Console!</button>
            <button class="output-button" id="stats-button" onclick="toggleFPS()">Toggle FPS Counter!</button>
            <button class="output-button" onclick="window.SAVEManager.openSAVEManager()">SAVE Manager!</button>
            <button class="output-button" onclick="toggleWASD(this)">Mirror WASD to Arrows!</button>
            <input id="colorpicker" type="color" onchange="changecolor(this)">
            <textarea id="output" style="display:none;"></textarea>
        </div>

        <button id="closeUIButton" onclick="hideUI()">×</button>
        
        <div id="message-container">
            <div id="messages"></div>
        </div>
    </div>

    <div id="customMessageBox" class="custom-message-box" style="display:none;">
        <div class="custom-message-box-content">
            <p id="messageBoxText"></p>
            <button id="messageBoxConfirmBtn">OK</button>
        </div>
    </div>

    <div id="saveManagerModal" class="save-manager-modal" style="display:none;">
        <div class="save-manager-content">
            <span class="close-button" onclick="window.SAVEManager.closeSAVEManager()">×</span>
            <div class="save-manager-content2">
                <span class="minimize-button" onclick="window.SAVEManager.closeSMnoreload()">‐</span>
                <h2>SAVE File Manager!</h2>
                <button class="output-button" onclick="toggleclear_site_cache()">Wipe all SAVEs?</button>
                <button id="exportAllBtn" class="output-button" onclick="SAVEManager.exportAllToZip()">Export all to ZIP?</button>
                <h3>Current SAVE Files:</h3>
                <div id="saveFileList" class="save-file-list"></div>
                <div class="file-upload-section">
                    <h3>Import Save Files?</h3>
                    <input type="file" id="uploadFileInput" multiple>
                    <input type="text" id="uploadFileNameInput" placeholder="Filename (e.g. file0)">
                    <button onclick="SAVEManager.handleUpload()">Select File(s)!</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. KEY MIRRORING (WASD & UT KEYS) ---
        (function() {
            const mapping = { 
                "w": "ArrowUp", "W": "ArrowUp",
                "a": "ArrowLeft", "A": "ArrowLeft",
                "s": "ArrowDown", "S": "ArrowDown",
                "d": "ArrowRight", "D": "ArrowRight",
                "Shift": "x", "Control": "c", "Meta": "c" 
            };
            const activeSynthetic = new Map();
            let mirroringEnabled = false;

            window.toggleWASD = function(btn) {
                mirroringEnabled = !mirroringEnabled;
                btn.innerText = mirroringEnabled ? "Stop Mirroring WASD!" : "Mirror WASD to Arrows!";
            };

            function dispatchSynthetic(type, key) {
                const ev = new KeyboardEvent(type, { key: key, bubbles: true });
                document.dispatchEvent(ev);
            }

            window.addEventListener("keydown", (e) => {
                if (mirroringEnabled && mapping[e.key]) {
                    if (!activeSynthetic.has(e.key)) {
                        activeSynthetic.set(e.key, mapping[e.key]);
                        dispatchSynthetic("keydown", mapping[e.key]);
                    }
                    e.preventDefault();
                }
            }, true);

            window.addEventListener("keyup", (e) => {
                const targetKey = activeSynthetic.get(e.key);
                if (targetKey) {
                    dispatchSynthetic("keyup", targetKey);
                    activeSynthetic.delete(e.key);
                    e.preventDefault();
                }
            }, true);
        })();

        // --- 2. UI & UTILITY FUNCTIONS ---
        window.hideUI = function() {
            const container = document.getElementById('output-container');
            container.style.display = container.style.display === 'none' ? 'block' : 'none';
        };

        window.toggleConsole = function() {
            const out = document.getElementById('output');
            out.style.display = out.style.display === 'none' ? 'block' : 'none';
        };

        window.toggleFPS = function() {
            // Emscripten specific: this usually toggles the internal stats
            if (typeof window.showStat !== 'undefined') {
                window.showStat = !window.showStat;
            } else {
                console.log("FPS engine not yet loaded.");
            }
        };

        window.toggleFullscreen = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        };

        window.changecolor = function(input) {
            document.body.style.backgroundColor = input.value;
        };

        // --- 3. SAVE MANAGER ---
        window.SAVEManager = {
            openSAVEManager: () => document.getElementById('saveManagerModal').style.display = 'flex',
            closeSAVEManager: () => {
                document.getElementById('saveManagerModal').style.display = 'none';
                window.location.reload();
            },
            closeSMnoreload: () => document.getElementById('saveManagerModal').style.display = 'none',
            handleUpload: () => console.log("Importing file..."),
            exportAllToZip: () => console.log("Exporting saves...")
        };

        // --- 4. MOBILE DETECTION ---
        window.addEventListener('load', () => {
            if (/Android|iPhone|iPad/i.test(navigator.userAgent)) {
                document.getElementById('mobile-buttons').style.display = 'block';
            }
        });
    </script>
</body>
</html>
