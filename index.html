<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA BÓVEDA v1.5 - SHITPOST EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Permanent+Marker&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff00; /* Verde hacker */
            --secondary: #ff00ff; /* Rosa chillón */
            --accent: #ffff00; /* Amarillo patito */
            --bg: #000000;
            --card-bg: rgba(20, 20, 20, 0.9);
            --bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body { 
            font-family: 'Comic Neue', cursive; 
            background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: #fff; 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glitch para el título */
        .glitch {
            font-family: 'Permanent Marker', cursive;
            font-size: 6rem;
            color: white;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.025em -0.05em 0 rgba(0,255,0,.75), 0.025em 0.05em 0 rgba(0,0,255,.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 3px 0 red, -3px -2px 0 blue; }
            25% { text-shadow: -2px -3px 0 red, 3px 2px 0 blue; }
            50% { text-shadow: 2px -3px 0 red, -3px 2px 0 blue; }
            75% { text-shadow: -2px 3px 0 red, 3px -2px 0 blue; }
            100% { text-shadow: 2px 3px 0 red, -3px -2px 0 blue; }
        }

        #welcome-screen {
            text-align: center;
            padding: 40px;
            border: 5px dashed var(--secondary);
            background: rgba(0,0,0,0.8);
            transform: rotate(-2deg);
        }

        .enter-btn {
            background: #ff0000;
            color: yellow;
            border: 4px solid yellow;
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.1s;
            font-family: 'Permanent Marker';
        }

        .enter-btn:hover {
            transform: scale(1.2) rotate(5deg);
            background: yellow;
            color: red;
        }

        /* EL BOTÓN TROLL */
        .troll-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00ff00;
            color: #000;
            padding: 15px;
            border-radius: 50%;
            font-weight: 900;
            cursor: pointer;
            z-index: 9999;
            border: 3px solid #fff;
            animation: jump 0.5s infinite alternate;
        }

        @keyframes jump {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        #game-section { display: none; padding: 20px; width: 95%; }

        .category-bar { margin-bottom: 30px; }

        .cat-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            font-family: 'Comic Neue';
            font-weight: bold;
            cursor: pointer;
        }

        .cat-btn.active { background: var(--secondary); clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
        }

        /* Tarjetas de juego estilo shitpost */
        .game-card { 
            background: #1a1a1a; 
            border: 3px solid #333;
            transition: 0.2s; 
            text-decoration: none; 
            overflow: hidden;
            position: relative;
        }

        .game-card:hover { 
            transform: scale(1.05) rotate(2deg); 
            border-color: var(--primary);
            filter: hue-rotate(90deg);
        }

        .game-img { width: 100%; height: 150px; object-fit: cover; filter: contrast(150%); }

        .game-info { padding: 10px; background: #000; color: #0f0; font-family: 'Courier New'; }

        .description-overlay {
            position: absolute; inset: 0;
            background: rgba(255, 255, 0, 0.8);
            color: #000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.2s;
            font-weight: 900; font-size: 1.5rem; transform: rotate(-10deg);
        }

        .game-card:hover .description-overlay { opacity: 1; }

        .show-content { display: block !important; }

    </style>
</head>
<body>

    <div class="troll-btn" onclick="trollMe()">🤑 FREE <br> ROBUX</div>

    <div id="welcome-screen">
        <h1 class="glitch">LA BÓVEDA v1.5</h1>
        <p style="color: #0f0; font-weight: bold;">[SISTEMA HACKEADO POR EL GRUPO DE SHITPOST]</p>
        <button class="enter-btn" onclick="openVault()">CLICK PARA VIRUS GRATIS</button>
    </div>

    <div id="game-section">
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterGames('all', this)">TODO EL CAOS</button>
            <button class="cat-btn" onclick="filterGames('platformer', this)">SALTOS MIEDOSOS</button>
            <button class="cat-btn" onclick="filterGames('action', this)">GOLPES Y TIROS</button>
            <button class="cat-btn" onclick="filterGames('extra', this)">RELLENO</button>
        </div>
        
        <div class="game-grid" id="main-grid">
            <a href="celeste-game.html" class="game-card" data-cat="platformer">
                <img src="celeste-thumb.jpeg" class="game-img" />
                <div class="game-info">🏔️ CELESTE (Está difícil bro)</div>
                <div class="description-overlay">NO LLORES</div>
            </a>

            <a href="Meatboy.html" class="game-card" data-cat="platformer">
                <img src="meat.jpeg" class="game-img" />
                <div class="game-info">🥩 CARNE CON PATAS</div>
                <div class="description-overlay">MUCHO SANGRE</div>
            </a>

            <a href="UNDERTALE.html" class="game-card" data-cat="action">
                <img src="under.png" class="game-img" />
                <div class="game-info">💀 SANS UNDERTALE</div>
                <div class="description-overlay">BAD TIME INCOMING</div>
            </a>

            <a href="isaac.html" class="game-card" data-cat="action">
                <img src="350.png" class="game-img" />
                <div class="game-info">💧 EL LLORÓN</div>
                <div class="description-overlay">Skill Issue?</div>
            </a>

            <a href="epstein.html" class="game-card" data-cat="action">
                <img src="ep.png" class="game-img" />
                <div class="game-info">🌚 NOCHE EN LA ISLA</div>
                <div class="description-overlay">TURBIO AF</div>
            </a>

            <a href="buckshot-roulette-game.html" class="game-card" data-cat="action">
                <img src="buckshot.jpeg" class="game-img" />
                <div class="game-info">🔫 RULETA CON EL BRO</div>
            </a>

            <a href="minecraft.html" class="game-card" data-cat="extra">
                <img src="182.png" class="game-img" />
                <div class="game-info">🧱 EL MAINCRA</div>
            </a>

            <a href="Soundboard.html" class="game-card" data-cat="extra">
                <img src="button.jpg" class="game-img" />
                <div class="game-info">🔊 RUIDOS GRACIOSOS</div>
            </a>
        </div>
    </div>

    <script>
        function openVault() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('game-section').classList.add('show-content');
            document.body.style.background = "#111";
            alert("⚠️ VIRUS INSTALADO CORRECTAMENTE (Es broma... ¿o no?)");
        }

        function filterGames(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const cards = document.querySelectorAll('.game-card');
            cards.forEach(card => {
                if (category === 'all' || card.getAttribute('data-cat') === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // LA FUNCIÓN DEL BOTÓN TROLL
        function trollMe() {
            const sounds = [
                "https://www.myinstants.com/media/sounds/taco-bell-bong.mp3",
                "https://www.myinstants.com/media/sounds/fart-echo.mp3",
                "https://www.myinstants.com/media/sounds/discord-notification.mp3"
            ];
            const audio = new Audio(sounds[Math.floor(Math.random() * sounds.length)]);
            audio.play();

            // Mueve el botón a un lugar aleatorio para que sea difícil clickearlo de nuevo
            const btn = document.querySelector('.troll-btn');
            btn.style.top = Math.random() * 80 + "vh";
            btn.style.left = Math.random() * 80 + "vw";
            
            // Cambia el texto
            const phrases = ["¿QUIERES MÁS?", "NO HAY ROBUX", "HACKEADO", "LMAO", "LOL"];
            btn.innerHTML = phrases[Math.floor(Math.random() * phrases.length)];
        }
    </script>
</body>
</html>
