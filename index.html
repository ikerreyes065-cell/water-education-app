<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Portal v3.0</title>
    <style>
        /* Modern Light Blue Theme */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #e0f2fe; /* Light sky blue background */
            color: #0369a1; /* Darker blue for text */
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }

        h1 { 
            color: #0ea5e9; 
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 40px; 
        }

        /* The Grid */
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; 
            padding: 20px; 
            max-width: 1100px; 
            margin: 0 auto; 
        }

        /* The Game Card */
        .game-card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            position: relative; /* Needed for the description overlay */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            border: none; 
            text-decoration: none; 
            display: block; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Hover Animation */
        .game-card:hover { 
            transform: translateY(-12px) scale(1.02); 
            box-shadow: 0 20px 25px -5px rgba(14, 165, 233, 0.4); 
        }

        .game-img { 
            width: 100%; 
            height: 160px; 
            object-fit: cover; 
            display: block;
        }

        .game-info { 
            padding: 15px; 
            background: white; 
        }

        .game-title { 
            font-weight: 800; 
            font-size: 1.1rem; 
            color: #0c4a6e; 
        }

        /* Description Overlay (Hidden by default) */
        .description-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(14, 165, 233, 0.9); /* Transparent light blue */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            border-radius: 20px;
        }

        .game-card:hover .description-overlay {
            opacity: 1;
        }

        /* Placeholder */
        .coming-soon { opacity: 0.6; cursor: default; }
        .coming-soon:hover { transform: none; box-shadow: none; }
    </style>
</head>
<body>

    <h1>Education Portal v3.0</h1>

    <div class="game-grid">
        
        <a href="celeste-game.html" class="game-card">
            <img src="celeste-thumb.jpeg" class="game-img" />
            <div class="game-info">
                <div class="game-title">Celeste Classic</div>
            </div>
            <div class="description-overlay">
                A challenging platformer about climbing a mountain. Precision is key!
            </div>
        </a>

        <a href="buckshot-roulette-game.html" class="game-card">
            <img src="buckshot.jpeg" class="game-img" />
            <div class="game-info">
                <div class="game-title">Buckshot Roulette</div>
            </div>
            <div class="description-overlay">
                A high-stakes game of chance. Strategy and luck are your only friends.
            </div>
        </a>

        <div class="game-card coming-soon">
            <div style="height: 160px; display: flex; align-items: center; justify-content: center; font-size: 50px; background: #bae6fd;">❓</div>
            <div class="game-info">
                <div class="game-title">More coming...</div>
            </div>
        </div>

    </div>

</body>
</html>
