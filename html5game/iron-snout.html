<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Snout</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #000;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- ✅ REMOVE cloak.js (it was 404) -->

<!-- ✅ Fake Poki (prevents crashes from game code) -->
<script>
window.PokiSDK = {
    init: () => Promise.resolve(),
    gameLoadingStart: () => {},
    gameLoadingFinished: () => {},
    gameplayStart: () => {},
    gameplayStop: () => {},
    gameLoadingProgress: () => {},
    setDebug: () => {},
    commercialBreak: () => Promise.resolve(),
    rewardedBreak: () => Promise.resolve(false)
};
</script>

<!-- ✅ GAME FILE -->
<script src="html5game/IronSnout.js"></script>

<script>
const canvas = document.getElementById("canvas");

function poki_loading(p) {
    if (window.PokiSDK && window.PokiSDK.gameLoadingProgress) {
        window.PokiSDK.gameLoadingProgress({ percentageDone: p });
    }
}

window.onload = function () {

    // start game
    if (typeof GameMaker_Init === "function") {
        GameMaker_Init();
    }

    // resize canvas
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    resize();
    window.addEventListener("resize", resize);

    // fix audio (required)
    document.addEventListener("click", () => {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            ctx.resume();
        } catch (e) {}
    });
};
</script>

</body>
</html>
