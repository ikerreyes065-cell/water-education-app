<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Snout</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- Fake Poki SDK (prevents crashes) -->
<script>
window.PokiSDK = {
    init: () => Promise.resolve(),
    gameLoadingStart: () => {},
    gameLoadingFinished: () => {},
    gameplayStart: () => {},
    gameplayStop: () => {},
    gameLoadingProgress: () => {},
    setDebug: () => {},
    commercialBreak: () => Promise.resolve(),
    rewardedBreak: () => Promise.resolve(false)
};
</script>

<!-- Game scripts -->
<script src="html5game/hqh_gmCallback.js"></script>
<script src="html5game/jqh_ImageLoadBar.js"></script>
<script src="html5game/kqh_SnoutWeb.js"></script>
<script src="html5game/iqh_poki.js"></script>
<script src="html5game/oqh_GameAnalytics.js"></script>
<script src="html5game/pqh_GameAnalyticsExt.js"></script>

<!-- Main game -->
<script src="html5game/IronSnout.js"></script>

<script>
const canvas = document.getElementById("canvas");

function poki_loading(p) {
    if (window.PokiSDK) {
        PokiSDK.gameLoadingProgress({ percentageDone: p });
    }
}

window.onload = function () {
    if (typeof GameMaker_Init === "function") {
        GameMaker_Init();
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    resize();
    window.addEventListener("resize", resize);

    // Fix audio unlock
    document.addEventListener("click", () => {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            ctx.resume();
        } catch(e){}
    });
};
</script>

</body>
</html>
