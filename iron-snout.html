<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Snout</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- ✅ SAFE Poki stub (no external SDK) -->
<script>
window.PokiSDK = {
    init: () => Promise.resolve(),
    gameLoadingStart: () => {},
    gameLoadingFinished: () => {},
    gameplayStart: () => {},
    gameplayStop: () => {},
    gameLoadingProgress: () => {},
    setDebug: () => {},
    commercialBreak: () => Promise.resolve(),
    rewardedBreak: () => Promise.resolve(false)
};

// ✅ REQUIRED globals (prevents crashes)
window.poki_loading = function (percent) {
    if (window.PokiSDK && window.PokiSDK.gameLoadingProgress) {
        window.PokiSDK.gameLoadingProgress({ percentageDone: percent });
    }
};

window.poki_loading_finished = function () {
    if (window.PokiSDK && window.PokiSDK.gameLoadingFinished) {
        window.PokiSDK.gameLoadingFinished();
    }
};

window.poki_log = function () {
    // no-op (prevents errors)
};
</script>

<!-- ❌ REMOVED poki-sdk.js (causes errors locally) -->

<!-- ✅ GameMaker support scripts -->
<script src="html5game/hqh_gmCallback.js"></script>
<script src="html5game/jqh_ImageLoadBar.js"></script>
<script src="html5game/kqh_SnoutWeb.js"></script>
<script src="html5game/iqh_poki.js"></script>
<script src="html5game/oqh_GameAnalytics.js"></script>
<script src="html5game/pqh_GameAnalyticsExt.js"></script>

<!-- ✅ Main game -->
<script src="html5game/IronSnout.js"></script>

<script>
const canvas = document.getElementById("canvas");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.onload = function () {

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // ✅ Start GameMaker safely
    if (typeof GameMaker_Init === "function") {
        try {
            GameMaker_Init();
        } catch (e) {
            console.error("GameMaker_Init failed:", e);
        }
    } else {
        console.error("GameMaker_Init not found");
    }

    // ✅ Proper audio unlock (uses existing context)
    document.addEventListener("click", function unlockAudio() {
        try {
            if (window.g_WebAudioContext && g_WebAudioContext.state !== "running") {
                g_WebAudioContext.resume();
            }
        } catch (e) {}

        document.removeEventListener("click", unlockAudio);
    });
};
</script>

</body>
</html>
