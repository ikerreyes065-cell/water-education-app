<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Snout</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- ✅ Poki stub (prevents crashes if SDK fails) -->
<script>
window.PokiSDK = {
    init: () => Promise.resolve(),
    gameLoadingStart: () => {},
    gameLoadingFinished: () => {},
    gameplayStart: () => {},
    gameplayStop: () => {},
    gameLoadingProgress: () => {},
    setDebug: () => {},
    commercialBreak: () => Promise.resolve(),
    rewardedBreak: () => Promise.resolve(false)
};
</script>

<!-- ✅ Load ALL required GameMaker + support scripts -->
<script src="html5game/poki-sdk.js"></script>

<script src="html5game/hqh_gmCallback.js"></script>
<script src="html5game/jqh_ImageLoadBar.js"></script>
<script src="html5game/kqh_SnoutWeb.js"></script>
<script src="html5game/iqh_poki.js"></script>
<script src="html5game/oqh_GameAnalytics.js"></script>
<script src="html5game/pqh_GameAnalyticsExt.js"></script>

<!-- ✅ Main game file LAST -->
<script src="html5game/IronSnout.js"></script>

<script>
var sdk = window.PokiSDK;
var canvas = document.getElementById("canvas");

window.onload = function () {
    sdk.init().then(() => {
        if (typeof GameMaker_Init === "function") {
            GameMaker_Init();
        }
        sdk.gameLoadingStart();
    }).catch(() => {
        if (typeof GameMaker_Init === "function") {
            GameMaker_Init();
        }
    });

    // Resize canvas to full screen
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener("resize", function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
};
</script>

</body>
</html>
