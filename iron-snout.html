<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="pragma" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Iron Snout</title>

    <!--
        IronSnout.js was compiled expecting to be served from the site
        root with its assets sitting in a sibling "html5game/" folder.
        Internally the engine loads helper scripts as "html5game/xxx.js"
        relative to the document, so the boot HTML must live at the
        repository root (same level as the html5game/ directory) and
        point explicitly at html5game/<file> for the scripts we own.
    -->
    <script type="text/javascript" src="html5game/cloak.js"></script>
    <script type="text/javascript" src="html5game/poki-sdk.js"></script>
    <script type="text/javascript" src="html5game/poki-sdk-core-v2.263.0.js"></script>
    <script>
        // The game's iqh_poki.js integration calls into a global "sdk"
        // object. poki-sdk.js only exposes window.PokiSDK, so mirror it
        // onto window.sdk to keep the integration shim happy.
        window.sdk = window.PokiSDK;
    </script>

    <style>
        html, body {
            background: #000;
            color: #ccc;
            margin: 0;
            padding: 0;
            border: 0;
            height: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            image-rendering: optimizeSpeed;
            image-rendering: pixelated;
            -webkit-interpolation-mode: nearest-neighbor;
            -ms-touch-action: none;
            touch-action: none;
            margin: 0;
            padding: 0;
            border: 0;
            max-width: 100%;
            max-height: 100%;
        }
        :-webkit-full-screen #canvas { width: 100%; height: 100%; }
        div.gm4html5_div_class { margin: 0; padding: 0; border: 0; }
    </style>
</head>
<body>
    <div class="gm4html5_div_class" id="gm4html5_div_id">
        <canvas id="canvas" width="1536" height="730" style="touch-action: none; cursor: none;">
            <p>Your browser doesn't support HTML5 canvas.</p>
        </canvas>
    </div>

    <script type="text/javascript" src="html5game/IronSnout.js"></script>
    <script>
        if (typeof GameMaker_Init === "function") {
            GameMaker_Init();
        }
    </script>
</body>
</html>
