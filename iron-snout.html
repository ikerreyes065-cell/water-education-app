<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Snout 2 - Fullscreen</title>
    <style>
        /* This makes the page fill the entire browser window */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* The container for the game */
        .game-iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        /* The actual game frame */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Simple button styling for the splash screen */
        .splash-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: white;
            font-family: Arial, sans-serif;
            background: linear-gradient(140deg, #1a1a1a, #000);
        }

        .play-btn {
            padding: 20px 50px;
            font-size: 24px;
            cursor: pointer;
            background: #fbde04;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background: #ff9214;
        }
    </style>
</head>
<body>

    <div class="game-iframe-container" id="gameContainer">
        <div class="splash-screen" id="splash">
            <img src="https://faf-games.gitlab.io/assets/img/ironsnout2/iron-snout-2.png" style="width: 200px; border-radius: 20px; margin-bottom: 20px;">
            <button class="play-btn" onclick="launchGame()">PLAY FULLSCREEN</button>
        </div>
    </div>

    <script>
        function launchGame() {
            const container = document.getElementById('gameContainer');
            // This URL points directly to the game source used in the original code
            const gameUrl = "https://raw.githack.com/snoutup/ironsnout/master/index.html"; 
            
            // Replace splash with the game iframe
            container.innerHTML = `<iframe src="${gameUrl}" allowfullscreen></iframe>`;
            
            // Request full screen mode
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            } else if (container.msRequestFullscreen) {
                container.msRequestFullscreen();
            }
        }
    </script>
</body>
</html>
