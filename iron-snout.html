<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Iron Snout - Local Fix</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { image-rendering: pixelated; width: 100%; height: auto; max-width: 1536px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gm4html5_div_id">
        <canvas id="canvas" width="1536" height="730">
            <p>Your browser doesn't support HTML5 canvas.</p>
        </canvas>
    </div>

    <script>
        // 1. MOCK POKI SDK (Fixes the first error)
        window.PokiSDK = {
            init: () => Promise.resolve(),
            gameLoadingStart: () => {},
            gameLoadingFinished: () => {},
            gameplayStart: () => {},
            gameplayStop: () => {},
            commercialBreak: () => Promise.resolve()
        };
        window.sdk = window.PokiSDK;

        // 2. BLOCK CORS ERRORS (Fixes the .ini and .log errors)
        // We "hijack" the browser's request system to return empty data instead of an error
        const originalOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            if (url.includes('ironSteam.ini') || url.includes('crash.log')) {
                // Redirect these to a "safe" empty data string
                url = "data:text/plain;base64,W2dhbWVkYXRhXQ0KbXVzaWM9MQ0Kc291bmQ9MQ=="; 
            }
            return originalOpen.apply(this, arguments);
        };

        // 3. AUDIO CONTEXT FIX
        // Browsers block sound until you click. This forces it to start.
        document.addEventListener('click', function() {
            if (typeof AudioContext !== 'undefined' || typeof webkitAudioContext !== 'undefined') {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }
        }, { once: true });
    </script>

    <script type="text/javascript" src="https://ironsnoutonline.github.io/file/html5game/IronSnout.js"></script>

    <script>
        window.onload = function() {
            if (typeof GameMaker_Init === "function") {
                GameMaker_Init();
            }
        };
    </script>
</body>
</html>
