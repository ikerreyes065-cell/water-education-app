<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers - LA BÓVEDA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: 'Outfit', sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 12px 24px;
            background: #38bdf8; /* Tu color primary */
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 12px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s cubic-bezier(0.68, -0.6, 0.32, 1.6);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-btn:hover {
            transform: scale(1.1) rotate(-2deg);
            background: #a855f7; /* Tu color secondary */
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅ VOLVER A LA BÓVEDA</a>
    
    <iframe src="https://monophy.github.io/subway-surfers/" allowfullscreen></iframe>
</body>
</html>
