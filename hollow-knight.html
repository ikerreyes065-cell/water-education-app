<!DOCTYPE html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/aukak/hollow-knight@2fc2e7149f0d5b2609b135ab48f00fd973930635/">
    <meta charset="utf-8">
    <title>Hollow Knight | Performance Mode</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #unity-canvas { width: 100vw; height: 100vh; background: #000; }
        #loading-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #7289da; font-family: sans-serif; font-size: 20px; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="loading-text">PREPARING VOID... 0%</div>
    <canvas id="unity-canvas"></canvas>

    <script>
        // --- MEMORY & CACHE HELPERS ---
        async function fetchGameFile(url, label) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            const contentLength = +response.headers.get('Content-Length');
            let receivedLength = 0;
            let chunks = [];
            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                chunks.push(value);
                receivedLength += value.length;
                document.getElementById('loading-text').innerText = `${label}: ${Math.round((receivedLength/contentLength)*100)}%`;
            }
            return URL.createObjectURL(new Blob(chunks));
        }

        (async () => {
            const canvas = document.querySelector("#unity-canvas");
            
            // 1. Fetch main files (Manually merging the 45 parts of data)
            // Note: For HK, we fetch the loader first
            const loaderUrl = "Build/hktruffled.loader.js";
            
            const script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = async () => {
                const dataUrl = await fetchGameFile("Build/hktruffled.data.part1", "LOADING DATA");
                const wasmUrl = await fetchGameFile("Build/hktruffled.wasm.part1", "LOADING WASM");

                const config = {
                    dataUrl: dataUrl,
                    frameworkUrl: "Build/hktruffled.framework.js",
                    codeUrl: wasmUrl,
                    streamingAssetsUrl: "StreamingAssets",
                    companyName: "Team Cherry",
                    productName: "Hollow Knight",
                    productVersion: "1.1",
                    // LAG FIXES START HERE:
                    devicePixelRatio: 1, // Forces 1:1 pixel mapping (HUGE FPS BOOST)
                    powerPreference: "high-performance",
                    webglContextAttributes: {
                        preserveDrawingBuffer: false,
                        powerPreference: "high-performance",
                        antialias: false, // Disabling antialiasing saves GPU power
                        depth: true
                    }
                };

                createUnityInstance(canvas, config, (progress) => {
                    document.getElementById('loading-text').innerText = "WAKING THE KNIGHT: " + Math.round(progress * 100) + "%";
                }).then((instance) => {
                    document.getElementById('loading-text').remove();
                });
            };
            document.body.appendChild(script);
        })();
    </script>
</body>
</html>
