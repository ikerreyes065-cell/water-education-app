<!DOCTYPE html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/aukak/hollow-knight@2fc2e7149f0d5b2609b135ab48f00fd973930635/">
    <meta charset="utf-8">
    <title>Hollow Knight (Optimized)</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #231F20;
        }

        #unity-container {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>

<body>

<div id="loading-text" style="color:white;font-size:32px;text-align:center;margin-top:20px;">
    LOADING...
</div>

<div hidden id="unity-container">
    <canvas id="unity-canvas"></canvas>
</div>

<script>
const DB_NAME = "cachedb";
const STORE_NAME = "files";

function openCacheDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME);
            }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function saveToCache(key, blob) {
    const db = await openCacheDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).put(blob, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

async function loadFromCache(key) {
    const db = await openCacheDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).get(key);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
    });
}

async function fetchWithProgress(url) {
    const response = await fetch(url);
    const reader = response.body.getReader();
    let chunks = [];
    let received = 0;

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received += value.length;
        chunks.push(value);
    }

    let fullBuffer = new Uint8Array(received);
    let offset = 0;
    for (let chunk of chunks) {
        fullBuffer.set(chunk, offset);
        offset += chunk.length;
    }

    return fullBuffer.buffer;
}

async function mergeFiles(fileParts, cacheKey) {
    const cached = await loadFromCache(cacheKey);
    if (cached) return URL.createObjectURL(cached);

    const buffers = await Promise.all(fileParts.map(fetchWithProgress));
    const mergedBlob = new Blob(buffers);
    await saveToCache(cacheKey, mergedBlob);

    return URL.createObjectURL(mergedBlob);
}

function getParts(file, start, end) {
    let parts = [];
    for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
    }
    return parts;
}

(async () => {
    const [dataUrl, wasmurl] = await Promise.all([
        mergeFiles(getParts("Build/hktruffled.data", 1, 45), "hktruffled.data"),
        mergeFiles(getParts("Build/hktruffled.wasm", 1, 2), "hktruffled.wasm")
    ]);

    const canvas = document.querySelector("#unity-canvas");
    const container = document.querySelector("#unity-container");

    function resizeCanvas() {
        const scale = 0.75; // LOWER = BETTER PERFORMANCE
        canvas.width = window.innerWidth * scale;
        canvas.height = window.innerHeight * scale;
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const config = {
        dataUrl: dataUrl,
        frameworkUrl: "Build/hktruffled.framework.js",
        codeUrl: wasmurl,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Team Cherry",
        productName: "Hollow Knight",
        productVersion: "1.1",
        devicePixelRatio: 1 // IMPORTANT PERFORMANCE FIX
    };

    container.hidden = false;

    const script = document.createElement("script");
    script.src = "Build/hktruffled.loader.js";

    script.onload = () => {
        createUnityInstance(canvas, config).then(() => {
            document.getElementById("loading-text").remove();
        }).catch(err => alert(err));
    };

    document.body.appendChild(script);
})();
</script>

</body>
</html>
