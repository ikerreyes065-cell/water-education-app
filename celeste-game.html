<!DOCTYPE html>
<html>
<head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/celeste@4f043a5ce121b74dc54ce56d74f213a2eeea6b4e/">
    <title>Celeste Port - Optimized</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="icon" type="image/x-icon" href="assets/app.ico" />
    <link rel="stylesheet" href="styles.css" />

    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        #loading-textt {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        /* Ocultar elementos de publicidad para ahorrar recursos */
        #sidebarad1, #sidebarad2 { display: none !important; }
    </style>

    <script src="cfg.js"></script>
    <script src="data.js"></script>
    <script type="module" src="bundle.js"></script>
</head>

<body>
    <div id="loading-textt">CARGANDO CELESTE...</div>
    <p style="font-size: 12px; color: #555;">Optimizado para Chromebook</p>

    <script>
        // Pequeño script para limpiar la memoria antes de empezar
        window.addEventListener('load', () => {
            console.log("Sistema listo. Iniciando instancia ligera.");
            // Si el texto de carga se queda pegado, lo quitamos cuando el juego inicie
            setTimeout(() => {
                const loader = document.getElementById('loading-textt');
                if (loader) loader.style.display = 'none';
            }, 15000); 
        });
    </script>
</body>
</html>
