<!DOCTYPE html>
<html>
<head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/celeste@4f043a5ce121b74dc54ce56d74f213a2eeea6b4e/">
    <title>Celeste Port - Emergency Lite</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="icon" type="image/x-icon" href="assets/app.ico" />
    <link rel="stylesheet" href="styles.css" />

    <script>
        // CONFIGURACIÓN DE MEMORIA PARA CHROMEBOOKS VIEJAS
        window.Module = {
            preRun: [],
            postRun: [],
            // Forzamos un límite de memoria para que Chrome no mate la pestaña
            TOTAL_MEMORY: 268435456, // 256MB fijos
            print: (function() { return function(text) { console.log(text); }; })(),
            printErr: function(text) { console.warn(text); },
            setStatus: function(text) { console.log("Status: " + text); }
        };

        // Limpieza de workers para evitar el crash de la "segunda vez"
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(r => r.forEach(s => s.unregister()));
        }
    </script>

    <script src="cfg.js"></script>
    <script src="data.js"></script>
    <script type="module" src="bundle.js"></script>

    <style>
        body { background-color: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; color: #333; font-family: sans-serif; }
        #loading-textt { color: #555; font-size: 18px; }
    </style>
</head>
<body>
    <div id="loading-textt">CARGANDO...</div>
</body>
</html>
