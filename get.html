<!DOCTYPE html>
<html lang="en">
<head>
  <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@main/getting-over-it/">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Getting Over It</title>

  <link rel="stylesheet" href="TemplateData/style.css">
  <link rel="shortcut icon" href="TemplateData/favicon.ico">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #231F20;
      font-family: Arial, sans-serif;
    }

    #unity-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #231F20;
    }

    #loading-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 28px;
      z-index: 10;
      text-align: center;
    }

    #unity-loading-bar {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      display: none;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 20px;
      background: #444;
      border-radius: 10px;
      overflow: hidden;
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: #ffffff;
      transition: width 0.2s;
    }

    /* Disable side ads on smaller devices */
    @media (max-width: 1400px) {
      #sidebarad1,
      #sidebarad2 {
        display: none;
      }
    }
  </style>
</head>

<body>

<div id="unity-container">
  <div id="loading-text">Loading...</div>

  <canvas id="unity-canvas"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
</div>

<script>
const canvas = document.querySelector("#unity-canvas");
const loadingText = document.querySelector("#loading-text");
const loadingBar = document.querySelector("#unity-loading-bar");
const progressBarFull = document.querySelector("#unity-progress-bar-full");

const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
const isChromebook = navigator.userAgent.toLowerCase().includes("cros");

function resizeCanvas() {
  const dpr = isChromebook ? 0.7 : window.devicePixelRatio || 1;

  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;

  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const buildUrl = "Build";

const config = {
  dataUrl: buildUrl + "/GettingOverIt.data",
  frameworkUrl: buildUrl + "/GettingOverIt.framework.js",
  codeUrl: buildUrl + "/GettingOverIt.wasm",
  streamingAssetsUrl: "StreamingAssets",

  companyName: "Bennett Foddy",
  productName: "Getting Over It",
  productVersion: "1.7",

  devicePixelRatio: isChromebook ? 0.7 : 1,

  // Important Chromebook optimization
  webglContextAttributes: {
    preserveDrawingBuffer: false,
    powerPreference: "low-power"
  },

  showBanner: function(msg) {
    console.log(msg);
  }
};

if (isMobile) {
  document.body.className = "unity-mobile";
}

loadingBar.style.display = "block";

const script = document.createElement("script");
script.src = buildUrl + "/GettingOverIt.loader.js";

script.onload = () => {
  createUnityInstance(canvas, config, (progress) => {
    progressBarFull.style.width = (progress * 100) + "%";
    loadingText.textContent =
      "Loading... " + Math.floor(progress * 100) + "%";
  })
  .then(() => {
    loadingBar.style.display = "none";
    loadingText.remove();
  })
  .catch((err) => {
    console.error(err);
    loadingText.textContent =
      "Failed to load. Chromebook may be out of memory.";
  });
};

document.body.appendChild(script);
</script>

</body>
</html>
